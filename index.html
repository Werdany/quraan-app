<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quraan App</title>
    <!-- normalize css file -->
    <link rel="stylesheet" href="css files/normalize.css" />
    <!-- css main file  -->
    <link rel="stylesheet" href="css files/main.css" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&#038;display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- Start aside -->
    <aside>
      <div class="logo">
        <img src="images/quraan logo.jpeg" />
        <h1>القرآن الكريم</h1>
      </div>
      <div class="side-list">
        <button class="btn active">الأستماع</button>
        <button class="btn">القراءه</button>
        <button class="btn">الأذكار</button>
        <button class="btn">الأحاديث</button>
        <button class="btn">حكم ومواعظ</button>
        <button class="btn">مواقيت الصلاه</button>
      </div>
    </aside>
    <!-- End aside -->
    <footer>
      <audio src="شامبيون.mp3"></audio>
      <input type="range" value="0" class="progress" />
      <div class="icon">
        <div class="song-name">
          <i class="fa-solid fa-music"></i>
          <div class="text">
            <h2>سورة الفاتحة</h2>
            <p>مشاري راشد العفاسي</p>
          </div>
        </div>
        <div class="play-pause">
          <i class="fa-solid fa-forward"></i>
          <i class="fa-solid fa-play"></i>
          <i class="fa-solid fa-backward"></i>
          <i class="fa-solid fa-repeat"></i>
        </div>
        <div class="time">
          <span class="counter">0:00</span>/<span class="fixed">0:00</span>
        </div>
      </div>
    </footer>
    <script src="js files/master.js"></script>
  </body>
</html>
